---
- name: Get NVME drive label
  ansible.builtin.import_tasks:
    file: nvme.yml

- name: Create GPT label
  community.general.parted:
    device: /dev/{{ diskdevice }}
    label: gpt

- name: Create EFI partition
  community.general.parted:
    device: /dev/{{ diskdevice }}
    number: 1
    part_start: 1MiB
    part_end: 1025MiB
    fs_type: fat32
    state: present
    label: gpt
    name: EFI


- name: Create BOOT partition
  community.general.parted:
    device: /dev/{{ diskdevice }}
    number: 2
    part_start: 1025MiB
    part_end: 2050MiB
    fs_type: fat32
    state: present
    label: gpt
    name: BOOT

- name: Set EFI esp flag
  ansible.builtin.command:
    cmd: parted -s /dev/{{ diskdevice }} set 1 esp on

- name: Set XBOOTLDR type on BOOT partition
  ansible.builtin.command:
    cmd: sgdisk -t 2:bc13c2ff-59e6-4262-a352-b275fd6f7172 /dev/{{ diskdevice }} -g

- name: Create root partition
  register: a_filesystems_format
  community.general.parted:
    device: /dev/{{ diskdevice }}
    number: 3
    part_start: 2050MiB
    part_end: 100%
    state: present
    fs_type: ext4
    label: gpt
    name: OS

- name: Create LUKS device
  community.crypto.luks_device:
    device: /dev/{{ diskdevice }}{% if 'nvme' in diskdevice %}p{% endif %}3
    state: present
    passphrase: "{{ luks_passhrase }}"

- name: Open LUKS device
  community.crypto.luks_device:
    device: /dev/{{ diskdevice }}{% if 'nvme' in diskdevice %}p{% endif %}3
    state: opened
    name: cryptroot
    passphrase: "{{ luks_passhrase }}"


- name: Format BOOT partition
  community.general.filesystem:
    dev: /dev/{{ diskdevice }}{% if 'nvme' in diskdevice %}p{% endif %}2
    fstype: vfat
    opts: -F32

- name: Format EFI partition
  community.general.filesystem:
    dev: /dev/{{ diskdevice }}{% if 'nvme' in diskdevice %}p{% endif %}1
    fstype: vfat
    opts: -F32

- name: Mount block
  when: a_filesystems_format.changed
  block:
    - name: Format cryptroot as BTRFS
      community.general.filesystem:
        dev: /dev/mapper/cryptroot
        fstype: btrfs
        force: true

    - name: Mount Btrfs filesystem temporarily
      ansible.posix.mount:
        path: /mnt
        src: /dev/mapper/cryptroot
        fstype: btrfs
        state: mounted

    - name: Create @ subvolume
      ansible.builtin.command: btrfs subvolume create /mnt/@
      args:
        creates: /mnt/@

    - name: Create @home subvolume
      ansible.builtin.command: btrfs subvolume create /mnt/@home
      args:
        creates: /mnt/@home

    - name: Create @snapshots subvolume
      ansible.builtin.command: btrfs subvolume create /mnt/@snapshots
      args:
        creates: /mnt/@snapshots

    - name: Unmount temporary mount
      ansible.posix.mount:
        path: /mnt
        state: unmounted

    - name: Mount root subvolume
      ansible.posix.mount:
        path: /mnt
        src: /dev/mapper/cryptroot
        fstype: btrfs
        opts: subvol=@,compress=zstd,noatime
        state: mounted

    - name: Create mountpoint directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /mnt/boot
        - /mnt/efi
        - /mnt/home
        - /mnt/.snapshots

    - name: Mount home subvolume
      ansible.posix.mount:
        path: /mnt/home
        src: /dev/mapper/cryptroot
        fstype: btrfs
        opts: subvol=@home,compress=zstd,noatime
        state: mounted

    - name: Mount snapshots subvolume
      ansible.posix.mount:
        path: /mnt/.snapshots
        src: /dev/mapper/cryptroot
        fstype: btrfs
        opts: subvol=@snapshots,compress=zstd,noatime
        state: mounted

    - name: Mount BOOT partition
      ansible.posix.mount:
        path: /mnt/boot
        src: /dev/{{ diskdevice }}{% if 'nvme' in diskdevice %}p{% endif %}2
        fstype: vfat
        state: mounted

    - name: Mount EFI partition
      ansible.posix.mount:
        path: /mnt/efi
        src: /dev/{{ diskdevice }}{% if 'nvme' in diskdevice %}p{% endif %}1
        fstype: vfat
        state: mounted
        opts: defaults,fmask=0137,dmask=0027
