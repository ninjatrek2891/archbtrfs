---
- name: Create efi linux directory
  ansible.builtin.file:
    path: /mnt/efi/EFI/Linux
    mode: "0644"
    state: directory

- name: Deploy linux preseed file
  ansible.builtin.copy:
    dest: /mnt/etc/mkinitcpio.d/linux.preseed
    mode: "0644"
    content: |
      # mkinitcpio preset file for the 'linux' package

      #ALL_config="/etc/mkinitcpio.conf"
      ALL_kver="/boot/vmlinuz-linux"
      #ALL_kerneldest="/boot/vmlinuz-linux"

      #PRESETS=('default')
      PRESETS=('default' 'fallback')

      default_config="/etc/mkinitcpio.conf"
      default_image="/boot/initramfs-linux.img"
      default_uki="/efi/EFI/Linux/arch-linux.efi"
      #default_options="--splash /usr/share/systemd/bootctl/splash-arch.bmp"

      fallback_config="/etc/mkinitcpio.conf"
      fallback_image="/boot/initramfs-linux-fallback.img"
      fallback_uki="/efi/EFI/Linux/arch-linux-fallback.efi"
      fallback_options="-S autodetect"


- name: Set mkinitcpio hooks for encrypted root
  notify: Rebuild initramfs
  ansible.builtin.lineinfile:
    path: /mnt/etc/mkinitcpio.conf
    regexp: '^HOOKS='
    line: 'HOOKS=(base systemd autodetect microcode modconf kms keyboard keymap sd-vconsole block sd-encrypt filesystems fsck)'


- name: Force notified handlers to run now
  ansible.builtin.meta: flush_handlers
