---
- name: Install packages
  community.general.pacman:
    name:
      - sway
      - swaybg
      - swayidle
      - swaylock
      - swayosd
      - waybar
      - wmenu
      - kitty
      - fastfetch
      - j4-dmenu-desktop
      - mako
      - neovim
      - gnome-keyring
      - seahorse
      - wl-clipboard
      - slurp
      - otf-font-awesome
      - ttf-jetbrains-mono
      - ttf-jetbrains-mono-nerd
      - greetd
      - greetd-tuigreet
      - thunar
      - galculator
      - grim
      - rclone
      # - gtk3
      # - gtk4
      # - xdg-desktop-portal
      # - xdg-desktop-portal-gtk
      # - xdg-desktop-portal-wlr
      # - breeze-gtk
      # - gnome-themes-extra
    state: present
    update_cache: false


- name: Create background directory
  ansible.builtin.file:
    path: /usr/share/backgrounds
    state: directory
    mode: "0755"
    owner: root
    group: root

- name: Deploy background into place
  ansible.builtin.copy:
    src: arch-background.jpg
    dest: /usr/share/backgrounds/arch-background.jpg
    owner: root
    group: root
    mode: "0644"

- name: Deploy greetd config
  ansible.builtin.copy:
    mode: "0644"
    owner: root
    group: root
    dest: /etc/greetd/config.toml
    content: |
      [terminal]
      # The VT to run the greeter on. Can be "next", "current" or a number
      # designating the VT.
      vt = 1

      # The default session, also known as the greeter.
      [default_session]

      # `agreety` is the bundled agetty/login-lookalike. You can replace `/bin/sh`
      # with whatever you want started, such as `sway`.
      command = "tuigreet -r --cmd 'sway --unsupported-gpu'"

      # The user to run the command as. The privileges this user must have depends
      # on the greeter. A graphical greeter may for example require the user to be
      # in the `video` group.
      user = "greeter"

- name: Enable greetd login
  register: k_userspace_greetd
  ansible.builtin.systemd:
    name: greetd
    enabled: true

- name: Write username to greetd
  ansible.builtin.copy:
    content: "{{ setup_username }}"
    dest: "/var/cache/tuigreet/lastuser"
    mode: "0644"
    owner: "greeter"
    group: "greeter"

