---
- name: Install SDDM and Plasma-meta
  changed_when: false
  ansible.builtin.command:
    cmd: >-
      arch-chroot /mnt pacman --noconfirm -S
      sddm
      plasma-meta
      dolphin
      konsole

- name: Put SDDM on wayland
  ansible.builtin.lineinfile:
    path: /mnt/usr/lib/sddm/sddm.conf.d/default.conf
    regexp: '^DisplayServer=x11'
    line: 'DisplayServer=wayland'

- name: Put breeze on wayland
  ansible.builtin.lineinfile:
    path: /mnt/usr/lib/sddm/sddm.conf.d/default.conf
    regexp: 'Current='
    line: 'Current=breeze'

- name: Create kdeglobals for user
  ansible.builtin.file:
    path: /mnt/home/{{ setup_username }}/.config/kdedefaults
    mode: "0755"
    state: directory

- name: Set kdeglobals to breeze
  ansible.builtin.copy:
    mode: "0600"
    dest: /mnt/home/{{ setup_username }}/.config/kdedefaults/kdeglobals
    owner: 1000
    group: 1000
    content: |
      [General]
      ColorScheme=BreezeDark

      [Icons]
      Theme=breeze-dark

      [KDE]
      widgetStyle=Breeze

- name: Enable sddm service
  changed_when: false
  ansible.builtin.command:
    cmd: >-
      arch-chroot /mnt systemctl enable sddm
