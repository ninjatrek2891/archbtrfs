---
- name: Arch BTRFS installation into VM
  hosts: all
  gather_facts: true
  vars:
    # diskdevice: [disk]
    # hostname: [hostname]
    # luks_passhrase: [luks]
    # setup_username: [username]
    # setup_password: [password]
  vars_prompt:
    - name: luks_passhrase
      prompt: "Enter LUKS passphrase"
      private: true
    - name: setup_username
      prompt: "Enter desired username"
      private: false
    - name: setup_password
      prompt: "Enter desired password"
      private: true
    - name: hostname
      prompt: "Enter system hostname"
      private: false
    - name: luks
      prompt: "What is the disk designation? (i.e. nvm0n1)"
      private: false
  roles:
    - 10.filesystems
    - 20.arch-initial
    - 30.hostname
    - 40.locale
    - 50.user
    - 60.mkinitcpio
    - 65.bootloader
    - 70.yay
    - 100.userspace
